events { worker_connections 1024; }

http {
  # ─── Basic settings ──────────────────────────────────────
  client_max_body_size 10m;
  keepalive_timeout 65;

  # ─── Rate limiting ────────────────────────────────────────
  # Limit permohonan submissions: 3 requests/hour per IP
  limit_req_zone $binary_remote_addr zone=permohonan_limit:10m rate=3r/h;
  # General API limit
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
  # Login brute-force protection
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

  # ─── Gzip compression ─────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/x-javascript
    application/octet-stream
    image/svg+xml
    image/x-icon
    font/woff
    font/woff2;

  # ─── Upstream services ────────────────────────────────────
  upstream web {
    server web:3000;
    keepalive 32;
  }
  upstream cms {
    server cms:3001;
    keepalive 16;
  }

  # ─── HTTP → HTTPS redirect ────────────────────────────────
  server {
    listen 80;
    server_name ppid.baznas-cianjur.or.id;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS main server ────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name ppid.baznas-cianjur.or.id;

    ssl_certificate     /etc/letsencrypt/live/ppid.baznas-cianjur.or.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ppid.baznas-cianjur.or.id/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ─── CMS admin panel ──────────────────────────────────────
    location /cms {
      # Restrict CMS to internal network / specific IPs in production
      # allow 192.168.1.0/24;
      # deny all;
      proxy_pass http://cms;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Rate limit on permohonan submission ──────────────────
    location /api/trpc/permohonan.submit {
      limit_req zone=permohonan_limit burst=2 nodelay;
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── General API ──────────────────────────────────────────
    location /api {
      limit_req zone=api_limit burst=10 nodelay;
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }



    # ─── Static assets cache ──────────────────────────────────
    location /_next/static {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      expires 365d;
      add_header Cache-Control "public, immutable";
    }

    location /static {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ─── MinIO / file uploads ─────────────────────────────────
    location /uploads {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      client_max_body_size 10m;
    }

    # ─── Next.js app ──────────────────────────────────────────
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
