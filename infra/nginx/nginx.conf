events { worker_connections 1024; }

http {
  # ─── Rate limiting ────────────────────────────────────────
  # Limit permohonan submissions: 3 requests/hour per IP
  limit_req_zone $binary_remote_addr zone=permohonan_limit:10m rate=3r/h;
  # General API limit
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

  # ─── Gzip compression ─────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  # ─── Upstream services ────────────────────────────────────
  upstream web { server web:3000; }
  upstream cms { server cms:3001; }

  # ─── HTTP → HTTPS redirect ────────────────────────────────
  server {
    listen 80;
    server_name ppid.baznas-cianjur.or.id;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS main server ────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name ppid.baznas-cianjur.or.id;

    ssl_certificate     /etc/letsencrypt/live/ppid.baznas-cianjur.or.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ppid.baznas-cianjur.or.id/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ─── CMS admin panel ──────────────────────────────────────
    location /cms {
      # Restrict CMS to internal network / specific IPs in production
      # allow 192.168.1.0/24;
      # deny all;
      proxy_pass http://cms;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Rate limit on permohonan submission ──────────────────
    location /api/trpc/permohonan.submit {
      limit_req zone=permohonan_limit burst=2 nodelay;
      proxy_pass http://web;
    }

    # ─── General API ──────────────────────────────────────────
    location /api {
      limit_req zone=api_limit burst=10 nodelay;
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Next.js app ──────────────────────────────────────────
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
