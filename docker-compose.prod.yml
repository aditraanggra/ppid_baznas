# Docker Compose — Production (VPS BAZNAS)
# Usage: docker compose -f docker-compose.prod.yml up -d
version: '3.9'

services:
  nginx:
    image: nginx:stable-alpine
    container_name: ppid_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - web
      - cms

  web:
    image: ppid-web:latest
    container_name: ppid_web
    restart: always
    environment:
      NODE_ENV: production
    env_file: .env.local
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  cms:
    image: ppid-cms:latest
    container_name: ppid_cms
    restart: always
    env_file: .env.local
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ppid_postgres
    restart: always
    env_file: .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppid_user -d ppid_baznas"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ppid_minio
    restart: always
    command: server /data
    env_file: .env.local
    volumes:
      - minio_data:/data
    expose:
      - "9000"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: ppid_uptime
    restart: always
    ports:
      - "3003:3001"
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD", "node", "server/server.js", "--health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  certbot_www:
  certbot_conf:
  uptime_kuma_data:
